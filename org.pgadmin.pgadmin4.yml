app-id: org.pgadmin.pgadmin4
runtime: org.freedesktop.Platform
runtime-version: '24.08'
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
sdk: org.freedesktop.Sdk
command: run.sh
separate-locales: false
rename-desktop-file: pgadmin4.desktop
rename-icon: pgadmin4
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.secrets
modules:
  - name: libpq
    # Copying build instructions for the libpg client library from
    # https://src.fedoraproject.org/rpms/libpq/blob/rawhide/f/libpq.spec
    config-opts:
      - --disable-rpath
      #- --with-ldap  # Disabling until somebody actually needs it
      - --with-openssl
      #- --with-gssapi  # Disabling until somebody actually needs it
      - --enable-nls
      - --without-readline
    sources:
      - type: git
        url: https://git.postgresql.org/git/postgresql.git
        commit: 62d6c7d3df6287f1bd83199c1a746e50d31571a0
        tag: REL_18_3
        x-checker-data:
          type: git
          tag-pattern: ^REL_([\d_]+)$

  - name: krb5
    subdir: src
    config-opts:
      - --localstatedir=/var/lib
      - --sbindir=${FLATPAK_DEST}/bin
      - --disable-static
      - --disable-rpath
    sources:
      - type: archive
        url: https://kerberos.org/dist/krb5/1.22/krb5-1.22.2.tar.gz
        sha256: 3243ffbc8ea4d4ac22ddc7dd2a1dc54c57874c40648b60ff97009763554eaf13
        x-checker-data:
          type: html
          url: https://kerberos.org/dist/
          version-pattern: Kerberos V5 Release ([\d\.-]*) - current release
          url-template: https://kerberos.org/dist/krb5/$version0.$version1/krb5-$version.tar.gz

  - name: python3-bcrypt
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links=file://${PWD} --prefix=${FLATPAK_DEST}
        bcrypt
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/d4/8d/5e43d9584b3b3591a6f9b68f755a4da879a59712981ef5ad2a0ac1379f7a/bcrypt-5.0.0-cp39-abi3-manylinux_2_34_x86_64.whl
        sha256: 611f0a17aa4a25a69362dcc299fda5c8a3d4f160e2abb3831041feb77393a14a

  - name: python3-pycparser
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links=file://${PWD} --prefix=${FLATPAK_DEST}
        pycparser
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/0c/c3/44f3fbbfa403ea2a7c779186dc20772604442dde72947e7d01069cbe98e3/pycparser-3.0-py3-none-any.whl
        sha256: b727414169a36b7d524c1c3e31839a521725078d7b2ff038656844266160a992
        x-checker-data:
          type: pypi
          name: pycparser
          packagetype: bdist_wheel

  - name: python3-cffi
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links=file://${PWD} --prefix=${FLATPAK_DEST}
        cffi
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/78/2d/7fa73dfa841b5ac06c7b8855cfc18622132e365f5b81d02230333ff26e9e/cffi-2.0.0-cp312-cp312-manylinux2014_x86_64.manylinux_2_17_x86_64.whl
        sha256: 3e17ed538242334bf70832644a32a7aae3d83b57567f9fd60a26257e992b79ba

  - name: python3-cryptography
    buildsystem: simple
    only-arches:
      - x86_64
    build-commands:
      - pip3 install --no-index --find-links=file://${PWD} --prefix=${FLATPAK_DEST}
        cryptography
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/94/87/f2b6c374a82cf076cfa1416992ac8e8ec94d79facc37aec87c1a5cb72352/cryptography-47.0.0-cp38-abi3-manylinux_2_34_x86_64.whl
        sha256: 2207a498b03275d0051589e326b79d4cf59985c99031b05bb292ac52631c37fe

  - python3-requirements_filtered.yaml

  - name: pgadmin4-server
    buildsystem: simple
    build-commands:
      - bsdtar -Oxf pgadmin-server.deb 'data.tar.xz' | bsdtar --exclude 'usr/pgadmin4/venv' -xf -
      - cp -r usr/* ${FLATPAK_DEST}/
      - mv ${FLATPAK_DEST}/pgadmin4 ${FLATPAK_DEST}/pgAdmin4
      - cat usr/pgadmin4/web/config_distro.py config_distro.py > ${FLATPAK_DEST}/pgAdmin4/web/config_distro.py
    sources:
      - type: file
        url: https://ftp.postgresql.org/pub/pgadmin/pgadmin4/apt/trixie/dists/pgadmin4/main/binary-amd64/pgadmin4-server_9.15-1.trixie_amd64.deb
        dest-filename: pgadmin-server.deb
        sha256: e6ca715bf4356c635e66c6defdbad39d47f817b4cd02b3b7575008b1dc330846
        x-checker-data:
          type: anitya
          project-id: 6603
          url-template: https://ftp.postgresql.org/pub/pgadmin/pgadmin4/apt/trixie/dists/pgadmin4/main/binary-amd64/pgadmin4-server_${version}-1.trixie_amd64.deb
      - type: file
        path: config_distro.py

  - name: pgadmin
    buildsystem: simple
    build-commands:
      - bsdtar -Oxf pgadmin-desktop.deb 'data.tar.xz' | bsdtar -xf -
      - cp -r usr/* ${FLATPAK_DEST}/
      - mv ${FLATPAK_DEST}/pgadmin4/* ${FLATPAK_DEST}/pgAdmin4
      - rm -rf ${FLATPAK_DEST}/pgadmin4

      - desktop-file-edit --set-key="Exec" --set-value="run.sh" ${FLATPAK_DEST}/share/applications/pgadmin4.desktop

      - install -Dm755 run.sh ${FLATPAK_DEST}/bin/run.sh
      - install -Dm644 org.pgadmin.pgadmin4.metainfo.xml ${FLATPAK_DEST}/share/metainfo/org.pgadmin.pgadmin4.metainfo.xml
    sources:
      - type: file
        url: https://ftp.postgresql.org/pub/pgadmin/pgadmin4/apt/trixie/dists/pgadmin4/main/binary-amd64/pgadmin4-desktop_9.15-1.trixie_amd64.deb
        dest-filename: pgadmin-desktop.deb
        sha256: d21b2e9eed588520dbd6432545c4b74efe5d164ae2ea775cf13d0ce4922dda55
        x-checker-data:
          type: anitya
          project-id: 6603
          url-template: https://ftp.postgresql.org/pub/pgadmin/pgadmin4/apt/trixie/dists/pgadmin4/main/binary-amd64/pgadmin4-desktop_${version}-1.trixie_amd64.deb

      - type: script
        commands:
          - zypak-wrapper /app/pgAdmin4/bin/pgadmin4 "$@"
        dest-filename: run.sh

      - type: file
        path: org.pgadmin.pgadmin4.metainfo.xml
